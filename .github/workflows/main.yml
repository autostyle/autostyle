name: CI

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

# Skip "GitHub Actions" error markers from tests
env:
  AUTOSTYLE_SKIP_GITHUB_ACTIONS: true

# https://help.github.com/en/actions/automating-your-workflow-with-github-actions/software-installed-on-github-hosted-runners

jobs:
  linux:
    name: 'Linux (JDK 17)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 50
      - name: 'Set up JDK 17'
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu
      - name: 'Test'
        run: |
          ./gradlew --no-parallel --no-daemon build -x npmTest -x autostyleFreshmarkCheck
  linux-self:
    name: 'Self-check, Linux (JDK 17)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 10
      - name: 'Set up JDK 17'
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu
      - name: 'Self-check'
        run: |
          ./gradlew --no-parallel --no-daemon jar
          ./gradlew --no-parallel --no-daemon -PautostyleSelf autostyleCheck

  # Aggregating job: branch protection requires only this check, so the matrix
  # jobs above can change their JDK or OS without touching the required checks.
  tests:
    name: 'Tests'
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - linux
      - linux-self
    steps:
      - name: 'Fail unless every required job succeeded'
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo 'A required job did not succeed:'
          echo '${{ toJSON(needs) }}'
          exit 1
